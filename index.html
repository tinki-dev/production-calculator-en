<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Production Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= ROOT ================= */

:root{
--accent:#7FB9FF;
--accent-dark:#5A8CDC;
--bg-top:#EEF3FF;
--bg-bottom:#F6F8FF;
--glass:rgba(255,255,255,0.65);
--glass-strong:rgba(255,255,255,0.9);
--border:rgba(255,255,255,0.4);
--text:#2c2c2c;
--muted:#666;
}

@media (prefers-color-scheme: dark){
:root{
--bg-top:#11121A;
--bg-bottom:#1A1B2A;
--glass:rgba(28,28,40,0.6);
--glass-strong:rgba(35,35,55,0.85);
--border:rgba(255,255,255,0.08);
--text:#EAEAF5;
--muted:#A0A0B5;
}
}

/* ================= GLOBAL ================= */

html, body{
height:100%;
margin:0;
padding:0;
background:linear-gradient(to bottom,var(--bg-top),var(--bg-bottom)) fixed;
color:var(--text);
font-family:'Playfair Display', serif;
overflow:hidden;
}

body{
min-height:100dvh;
display:flex;
flex-direction:column;
}

/* ================= APP ================= */

.app{
flex:1;
display:flex;
flex-direction:column;
justify-content:space-between;
width:100%;
max-width:500px;
margin:0 auto;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

/* ================= VIEW ================= */

.view{
flex:1;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px 18px 0 18px;
animation:fade .25s ease;
}

.view.active{display:flex;}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* ================= TYPO ================= */

h1{
font-size:22px;
font-weight:600;
color:var(--accent-dark);
}

.subtitle{
font-size:12px;
margin-top:4px;
opacity:.75;
color:var(--muted);
}

/* ================= SEGMENT ================= */

.segment{
margin-top:16px;
display:flex;
background:var(--glass);
border-radius:30px;
backdrop-filter:blur(20px);
border:1px solid var(--border);
overflow:hidden;
}

.segment button{
flex:1;
padding:6px;
border:none;
background:none;
cursor:pointer;
color:var(--text);
font-size:14px;
}

.segment button.active{
background:var(--glass-strong);
color:var(--accent-dark);
}

.mode{
margin-top:4px;
font-size:11px;
font-style:italic;
color:var(--muted);
}

/* ================= CARD ================= */

.card{
margin-top:16px;
width:100%;
background:var(--glass);
border-radius:22px;
backdrop-filter:blur(20px);
border:1px solid var(--border);
padding:14px;
display:flex;
flex-direction:column;
gap:8px;
}

input{
padding:6px;
border-radius:10px;
border:none;
background:var(--glass-strong);
text-align:center;
color:var(--text);
font-size:14px;
}

input:disabled{opacity:.4;}

button.calc{
padding:6px;
border:none;
border-radius:16px;
background:var(--accent);
color:white;
cursor:pointer;
}

.result{
margin-top:6px;
font-size:22px;
font-weight:700;
color:var(--accent-dark);
text-align:center;
}

.comparison{
font-size:12px;
text-align:center;
color:var(--muted);
}

/* ================= FLOATING TABBAR ================= */

.tabbar-wrapper{
padding-bottom:20px;
padding-top:10px;
}

.tabbar{
width:90%;
margin:0 auto;
height:55px;
display:flex;
justify-content:space-around;
align-items:center;
background:var(--glass);
border-radius:25px;
backdrop-filter:blur(20px);
border:1px solid var(--border);
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.tabbar button{
flex:1;
border:none;
background:none;
cursor:pointer;
color:var(--muted);
font-size:14px;
}

.tabbar button.active{
color:var(--accent-dark);
}

/* ================= SETTINGS ================= */

.section-title{
margin-top:20px;
font-size:14px;
opacity:.6;
}

.setting-row{
width:100%;
padding:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
font-size:14px;
}

.setting-row:last-child{border:none;}

.radio{
accent-color:var(--accent-dark);
}

canvas{margin-top:15px;}

.stat{
margin-top:10px;
background:var(--glass);
border-radius:16px;
padding:10px;
text-align:center;
border:1px solid var(--border);
font-size:13px;
}

</style>
</head>

<body>
<div class="app">

<!-- CALCULATOR -->
<div id="calcView" class="view active">
<h1>Production Planner</h1>
<div class="subtitle">Optimize your production flow</div>

<div class="segment">
<button id="onlineBtn" class="active">Online</button>
<button id="offlineBtn">Offline</button>
</div>

<div class="mode" id="modeText">Online mode active</div>

<div class="card">
<input type="number" id="days" placeholder="Days">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="minutes" placeholder="Minutes">
<input type="number" id="units" placeholder="Units every 9s">
<input type="number" id="manual" placeholder="Manual units">
<input type="number" id="increase" placeholder="Increase %">
<button class="calc" id="calcBtn">Calculate</button>
<div class="result" id="result">0</div>
<div class="comparison" id="comparison"></div>
</div>
</div>

<!-- ANALYTICS -->
<div id="analyticsView" class="view">
<h1>Analytics</h1>
<canvas id="chart" height="180"></canvas>
<div class="stat" id="totalCalc"></div>
<div class="stat" id="totalProd"></div>
<div class="stat" id="avgProd"></div>
</div>

<!-- SETTINGS -->
<div id="settingsView" class="view">
<h1>Settings</h1>

<div class="section-title">Display</div>
<div class="setting-row">
<span>Show comparison</span>
<input type="checkbox" id="showComparison">
</div>
<div class="setting-row">
<span>Apply 50% boost after hour 3</span>
<input type="checkbox" id="boostComparison">
</div>

<div class="section-title">Appearance</div>
<div class="setting-row"><span>Pastel Blue</span><input type="radio" name="theme" class="radio" value="#7FB9FF" checked></div>
<div class="setting-row"><span>Pastel Pink</span><input type="radio" name="theme" class="radio" value="#FF9FB9"></div>
<div class="setting-row"><span>Pastel Purple</span><input type="radio" name="theme" class="radio" value="#C3A6FF"></div>
<div class="setting-row"><span>Pastel Orange</span><input type="radio" name="theme" class="radio" value="#FFB37F"></div>
<div class="setting-row"><span>Pastel Yellow</span><input type="radio" name="theme" class="radio" value="#FFD97F"></div>

</div>

<div class="tabbar-wrapper">
<div class="tabbar">
<button class="active" data-tab="calcView">Calculator</button>
<button data-tab="analyticsView">Analytics</button>
<button data-tab="settingsView">Settings</button>
</div>
</div>

</div>

<script>

/* ================= TABS ================= */

document.querySelectorAll(".tabbar button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tabbar button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

/* ================= THEME ================= */

document.querySelectorAll("input[name='theme']").forEach(r=>{
r.onchange=()=>{
document.documentElement.style.setProperty("--accent",r.value);
document.documentElement.style.setProperty("--accent-dark",r.value);
localStorage.setItem("theme",r.value);
};
});

let savedTheme=localStorage.getItem("theme");
if(savedTheme){
document.documentElement.style.setProperty("--accent",savedTheme);
document.documentElement.style.setProperty("--accent-dark",savedTheme);
}

/* ================= CALC LOGIC ================= */

let mode="online";

onlineBtn.onclick=()=>setMode("online");
offlineBtn.onclick=()=>setMode("offline");

function setMode(m){
mode=m;
onlineBtn.classList.toggle("active",m==="online");
offlineBtn.classList.toggle("active",m==="offline");
modeText.innerText=m==="online"?"Online mode active":"Offline mode active";
days.disabled=(m==="offline");
}

function format(n){return Math.round(n).toLocaleString("de-DE");}

function calcOnline(sec,u,man){return (sec/9)*u+man;}
function calcOffline(sec,u,man){
let totalHours=Math.min(sec/3600,7);
let firstTwo=Math.min(totalHours,2);
let rest=Math.max(totalHours-2,0);
return (firstTwo*3600/9)*u+(rest*3600/9)*u*0.2+man;
}

calcBtn.onclick=()=>{
let d=+days.value||0;
let h=+hours.value||0;
let m=+minutes.value||0;
let u=+units.value||0;
let man=+manual.value||0;
let inc=+increase.value||0;
if(inc>50)inc=50;

let sec=d*86400+h*3600+m*60;
let base=(mode==="online"?calcOnline(sec,u,man):calcOffline(sec,u,man))*(1+inc/100);

result.innerText=format(base);

if(showComparison.checked){
let onlineVal=calcOnline(sec,u,man);
let offlineVal=calcOffline(sec,u,man);

if(boostComparison.checked){
let totalHours=Math.min(sec/3600,7);
if(totalHours>2){
let rest=Math.max(totalHours-2,0);
offlineVal+=(rest*3600/9)*u*0.5;
}
}

let compareTo=mode==="online"?offlineVal:onlineVal;
if(compareTo>0){
let diff=((base-compareTo)/compareTo)*100;
comparison.innerText=(diff>=0?"+":"")+Math.round(diff)+"% "+
(diff>=0?"Win":"Lost")+" in comparison to "+(mode==="online"?"Offline":"Online");
}
}else comparison.innerText="";
};

</script>

</body>
</html>
