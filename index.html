<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Production Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--accent:#7FB9FF;
--accent-dark:#5A8CDC;
--bg-top:#EEF3FF;
--bg-bottom:#F6F8FF;
--glass:rgba(255,255,255,0.65);
--glass-strong:rgba(255,255,255,0.85);
--border:rgba(255,255,255,0.4);
--text:#2c2c2c;
--muted:#666;
}

@media (prefers-color-scheme: dark){
:root{
--accent:#9FA8FF;
--accent-dark:#B8BFFF;
--bg-top:#11121A;
--bg-bottom:#1A1B2A;
--glass:rgba(28,28,40,0.6);
--glass-strong:rgba(35,35,55,0.85);
--border:rgba(255,255,255,0.08);
--text:#EAEAF5;
--muted:#A0A0B5;
}
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Playfair Display', serif;}

body{
height:100vh;
background:linear-gradient(to bottom,var(--bg-top),var(--bg-bottom));
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:var(--text);
}

.app{
width:100%;
max-width:420px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.view{
flex:1;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
animation:fadeSlide .35s ease;
}

.view.active{display:flex;}

@keyframes fadeSlide{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:24px;
font-weight:600;
color:var(--accent-dark);
}

.subtitle{
margin-top:6px;
font-size:13px;
opacity:.7;
color:var(--muted);
}

.segment{
margin-top:20px;
display:flex;
background:var(--glass);
border-radius:40px;
backdrop-filter:blur(25px);
border:1px solid var(--border);
overflow:hidden;
}

.segment button{
flex:1;
padding:8px;
border:none;
background:none;
cursor:pointer;
color:var(--text);
transition:.2s;
}

.segment button.active{
background:var(--glass-strong);
color:var(--accent-dark);
}

.segment button:active{transform:scale(.96);}

.mode{
margin-top:6px;
font-size:11px;
font-style:italic;
color:var(--muted);
}

.card{
margin-top:20px;
width:100%;
background:var(--glass);
border-radius:25px;
backdrop-filter:blur(25px);
border:1px solid var(--border);
padding:18px;
display:flex;
flex-direction:column;
gap:10px;
}

input{
padding:8px;
border-radius:12px;
border:none;
background:var(--glass-strong);
text-align:center;
color:var(--text);
}

input:disabled{opacity:.4;}

button.calc{
padding:8px;
border:none;
border-radius:20px;
background:var(--accent);
color:white;
cursor:pointer;
transition:.2s;
}

button.calc:active{transform:scale(.95);}

.result{
margin-top:10px;
font-size:24px;
font-weight:700;
color:var(--accent-dark);
text-align:center;
}

.comparison{
margin-top:4px;
font-size:13px;
text-align:center;
color:var(--muted);
}

.tabbar{
height:60px;
display:flex;
background:var(--glass);
border-top:1px solid var(--border);
backdrop-filter:blur(25px);
}

.tabbar button{
flex:1;
border:none;
background:none;
cursor:pointer;
color:var(--muted);
transition:.2s;
}

.tabbar button.active{color:var(--accent-dark);}

.stat{
margin-top:10px;
background:var(--glass);
border-radius:18px;
padding:12px;
text-align:center;
border:1px solid var(--border);
}

canvas{margin-top:20px;}
</style>
</head>

<body>
<div class="app">

<!-- CALCULATOR -->
<div id="calcView" class="view active">
<h1>Production Planner</h1>
<div class="subtitle">Optimize your production flow</div>

<div class="segment">
<button id="onlineBtn" class="active">Online</button>
<button id="offlineBtn">Offline</button>
</div>

<div class="mode" id="modeText">Online mode active</div>

<div class="card">
<input type="number" id="days" placeholder="Days">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="minutes" placeholder="Minutes">
<input type="number" id="units" placeholder="Units every 9s">
<input type="number" id="manual" placeholder="Manual units">
<input type="number" id="increase" placeholder="Increase %">
<button class="calc" id="calcBtn">Calculate</button>
<div class="result" id="result">0</div>
<div class="comparison" id="comparison"></div>
</div>
</div>

<!-- ANALYTICS -->
<div id="analyticsView" class="view">
<h1>Analytics</h1>
<canvas id="chart" height="200"></canvas>
<div class="stat" id="totalCalc"></div>
<div class="stat" id="totalProd"></div>
<div class="stat" id="avgProd"></div>
</div>

<!-- SETTINGS -->
<div id="settingsView" class="view">
<h1>Settings</h1>
<div class="stat">
<label><input type="checkbox" id="showComparison" checked> Show comparison</label>
</div>
<div class="stat">
<label><input type="checkbox" id="boostComparison"> Apply 50% comparison boost after hour 3</label>
</div>
</div>

<div class="tabbar">
<button class="active" data-tab="calcView">Calculator</button>
<button data-tab="analyticsView">Analytics</button>
<button data-tab="settingsView">Settings</button>
</div>

</div>

<script>
let mode="online";
let historyData=JSON.parse(localStorage.getItem("history")||"[]");

document.querySelectorAll(".tabbar button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tabbar button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

onlineBtn.onclick=()=>setMode("online");
offlineBtn.onclick=()=>setMode("offline");

function setMode(m){
mode=m;
onlineBtn.classList.toggle("active",m==="online");
offlineBtn.classList.toggle("active",m==="offline");
modeText.innerText=m==="online"?"Online mode active":"Offline mode active";
days.disabled=(m==="offline");
}

function format(n){return Math.round(n).toLocaleString("de-DE");}

function calculateOnline(sec,u,man){return (sec/9)*u+man;}
function calculateOffline(sec,u,man){
let totalHours=Math.min(sec/3600,7);
let firstTwo=Math.min(totalHours,2);
let rest=Math.max(totalHours-2,0);
return (firstTwo*3600/9)*u+(rest*3600/9)*u*0.2+man;
}

calcBtn.onclick=()=>{
let d=+days.value||0;
let h=+hours.value||0;
let m=+minutes.value||0;
let u=+units.value||0;
let man=+manual.value||0;
let inc=+increase.value||0;
if(inc>50)inc=50;

let sec=d*86400+h*3600+m*60;
let base=mode==="online"?calculateOnline(sec,u,man):calculateOffline(sec,u,man);
base*=1+inc/100;

result.innerText=format(base);

if(showComparison.checked){
let onlineVal=calculateOnline(sec,u,man);
let offlineVal=calculateOffline(sec,u,man);

if(boostComparison.checked){
let totalHours=Math.min(sec/3600,7);
if(totalHours>2){
let rest=Math.max(totalHours-2,0);
offlineVal+=(rest*3600/9)*u*0.5;
}
}

let compareTo=mode==="online"?offlineVal:onlineVal;
if(compareTo>0){
let diff=((base-compareTo)/compareTo)*100;
comparison.innerText=(diff>=0?"+":"")+Math.round(diff)+"% "+
(diff>=0?"Win":"Lost")+" in comparison to "+(mode==="online"?"Offline":"Online");
}else comparison.innerText="";
}else comparison.innerText="";

historyData.push(base);
localStorage.setItem("history",JSON.stringify(historyData));
updateAnalytics();
};

let chart=new Chart(document.getElementById("chart"),{
type:'line',
data:{labels:[],datasets:[{data:[],borderColor:getComputedStyle(document.documentElement).getPropertyValue('--accent-dark'),fill:false,tension:.3}]},
options:{plugins:{legend:{display:false}}}
});

function updateAnalytics(){
chart.data.labels=historyData.map((_,i)=>i+1);
chart.data.datasets[0].data=historyData;
chart.update();

let total=historyData.reduce((a,b)=>a+b,0);
totalCalc.innerText="Total Calculations: "+historyData.length;
totalProd.innerText="Total Production: "+format(total);
avgProd.innerText="Average Production: "+format(total/historyData.length||0);
}

updateAnalytics();
</script>

</body>
</html>
