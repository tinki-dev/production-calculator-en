<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Production Calculator</title>

<style>
* { box-sizing: border-box; }

:root{
--accent:#7FB9FF;
--bg:#f2f2f7;
--card:rgba(255,255,255,0.7);
--text:#1c1c1e;
--secondary:#8e8e93;
--border:rgba(0,0,0,0.05);
}

@media (prefers-color-scheme: dark){
:root{
--bg:#000;
--card:rgba(28,28,30,0.7);
--text:#fff;
--secondary:#8e8e93;
--border:rgba(255,255,255,0.08);
}
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

.container{
flex:1;
padding:15px 20px 0 20px;
overflow:hidden;
}

h1{
font-size:22px;
font-weight:600;
margin:5px 0 12px 0;
}

.card{
background:var(--card);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:22px;
padding:14px;
border:1px solid var(--border);
box-shadow:0 8px 30px rgba(0,0,0,0.05);
transition:all .25s ease;
}

input{
width:100%;
padding:11px;
margin-top:8px;
border-radius:14px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:16px;
border:none;
font-weight:600;
background:var(--accent);
color:#000;
transition:all .15s ease;
}

button:active{
transform:scale(0.96);
}

.secondaryBtn{
background:transparent;
color:var(--accent);
border:1px solid var(--accent);
}

.result{
font-size:22px;
font-weight:700;
text-align:center;
margin-top:10px;
transition:.2s ease;
}

.loss{
font-size:12px;
text-align:center;
margin-top:5px;
display:none;
opacity:.8;
}

.toggleRow{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:5px;
}

.switch{
position:relative;
width:44px;height:24px;
}

.switch input{display:none;}

.slider{
position:absolute;
inset:0;
background:#ccc;
border-radius:20px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
height:18px;width:18px;
left:3px;bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:var(--accent);
}

input:checked + .slider:before{
transform:translateX(20px);
}

.tabBar{
height:65px;
background:var(--card);
backdrop-filter:blur(20px);
border-top:1px solid var(--border);
display:flex;
justify-content:space-around;
align-items:center;
}

.tab{
flex:1;
text-align:center;
font-size:14px;
color:var(--secondary);
transition:.2s ease;
}

.tab.active{
color:var(--accent);
font-weight:600;
}

.view{
display:none;
height:100%;
opacity:0;
transform:translateY(10px);
transition:.25s ease;
}

.view.active{
display:block;
opacity:1;
transform:translateY(0);
}

.analyticsScroll{
overflow:auto;
height:100%;
padding-bottom:20px;
}

.themeOption{
padding:8px;
margin-top:8px;
border-radius:10px;
border:1px solid var(--border);
cursor:pointer;
transition:.2s ease;
}

.themeOption:hover{
opacity:.8;
}
</style>
</head>

<body>

<div class="container">

<!-- CALCULATOR -->
<div id="calculatorView" class="view active">

<h1>Calculator</h1>

<div class="card">

<div class="toggleRow">
<span>Online</span>
<label class="switch">
<input type="checkbox" id="modeToggle" onchange="switchMode()">
<span class="slider"></span>
</label>
<span>Offline</span>
</div>

<input type="number" id="days" placeholder="Days">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="minutes" placeholder="Minutes (optional)">
<input type="number" id="units" placeholder="Units every 9 seconds">
<input type="number" id="manual" placeholder="Manual units (optional)">
<input type="number" id="inc" placeholder="Increase % (max 50)">

<button onclick="calc()">Calculate</button>

<div class="result" id="result">Result: 0</div>
<div class="loss" id="loss"></div>

</div>

</div>

<!-- ANALYTICS -->
<div id="analyticsView" class="view">

<div class="analyticsScroll">

<h1>Analytics</h1>

<div class="card" id="analyticsContent"></div>

<div class="card" style="margin-top:12px;">
<button class="secondaryBtn" onclick="exportCSV()">Export CSV</button>
<button class="secondaryBtn" onclick="clearAllData()">Clear Data</button>
</div>

</div>

</div>

<!-- SETTINGS -->
<div id="settingsView" class="view">

<h1>Settings</h1>

<div class="card">
<b>Theme</b>
<div class="themeOption" onclick="setTheme('#7FB9FF')">Pastel Blue</div>
<div class="themeOption" onclick="setTheme('#B8A4FF')">Pastel Purple</div>
<div class="themeOption" onclick="setTheme('#FFB3D1')">Pastel Pink</div>
</div>

</div>

</div>

<!-- TAB BAR -->
<div class="tabBar">
<div class="tab active" onclick="switchTab('calculator')">Calculator</div>
<div class="tab" onclick="switchTab('analytics')">Analytics</div>
<div class="tab" onclick="switchTab('settings')">Settings</div>
</div>

<script>

let historyData = JSON.parse(localStorage.getItem("history")||"[]");

function format(v){ return Math.round(v).toLocaleString("de-DE"); }

function switchMode(){
if(modeToggle.checked){
document.documentElement.style.setProperty('--accent','#B8A4FF');
loss.style.color="#B8A4FF";
}else{
document.documentElement.style.setProperty('--accent','#7FB9FF');
loss.style.color="#7FB9FF";
}
}

function calc(){

let d=+days.value||0,h=+hours.value||0,m=+minutes.value||0;
let u=+units.value||0,man=+manual.value||0,i=+inc.value||0;
if(i>50)i=50;

let seconds=(d*86400)+(h*3600)+(m*60);
let online=(seconds/9)*u+man;
let final=online;
let mode="online";

if(modeToggle.checked){
mode="offline";
let totalHours=Math.min(seconds/3600,7);
let firstTwo=Math.min(totalHours,2);
let remaining=Math.max(totalHours-2,0);
let full=(firstTwo*3600/9)*u;
let reduced=(remaining*3600/9)*u*0.2;
final=full+reduced+man;
loss.style.display="block";
loss.innerText="Loss vs Online: "+format(online-final);
}else{
loss.style.display="none";
}

final=final*(1+(i/100));
result.innerText="Result: "+format(final);

historyData.unshift({mode:mode,result:Math.round(final)});
localStorage.setItem("history",JSON.stringify(historyData));

updateAnalytics();
}

function updateAnalytics(){
if(!historyData.length){
analyticsContent.innerHTML="No data yet.";
return;
}

let total=historyData.length;
let sum=historyData.reduce((a,b)=>a+(b.result||0),0);
let avg=sum/total;

analyticsContent.innerHTML=`
Total Calculations: ${total}<br>
Total Production: ${format(sum)}<br>
Average: ${format(avg)}
`;
}

function exportCSV(){
let csv="Mode,Result\n";
historyData.forEach(v=>{csv+=v.mode+","+v.result+"\n";});
let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="production-history.csv";
a.click();
}

function clearAllData(){
if(confirm("Delete all history?")){
historyData=[];
localStorage.setItem("history","[]");
updateAnalytics();
}
}

function switchTab(tab){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

if(tab==="calculator"){
calculatorView.classList.add("active");
document.querySelectorAll(".tab")[0].classList.add("active");
}
if(tab==="analytics"){
analyticsView.classList.add("active");
document.querySelectorAll(".tab")[1].classList.add("active");
}
if(tab==="settings"){
settingsView.classList.add("active");
document.querySelectorAll(".tab")[2].classList.add("active");
}
}

updateAnalytics();

</script>

</body>
</html>
