<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Production Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--accent:#ff9f0a;
--bg:#f2f2f7;
--card:rgba(255,255,255,0.8);
--text:#1c1c1e;
--secondary:#8e8e93;
--border:#e5e5ea;
}

@media (prefers-color-scheme: dark){
:root{
--bg:#000000;
--card:rgba(28,28,30,0.8);
--text:#ffffff;
--secondary:#8e8e93;
--border:#2c2c2e;
}
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:var(--text);
padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
transition:0.3s;
}

.container{
max-width:500px;
margin:auto;
}

h1{
font-size:28px;
font-weight:600;
margin-top:20px;
}

.card{
backdrop-filter:blur(20px);
background:var(--card);
border-radius:24px;
padding:18px;
margin-top:15px;
border:1px solid var(--border);
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:16px;
border:1px solid var(--border);
font-size:16px;
background:transparent;
color:var(--text);
}

button{
width:100%;
padding:16px;
margin-top:15px;
border-radius:18px;
border:none;
font-size:17px;
font-weight:600;
background:var(--accent);
color:black;
transition:0.15s;
}

button:active{
transform:scale(0.97);
opacity:0.9;
}

.result{
font-size:26px;
font-weight:700;
text-align:center;
margin-top:10px;
transition:0.3s;
}

.stats{
margin-top:10px;
font-size:14px;
color:var(--secondary);
text-align:center;
}

canvas{
margin-top:15px;
}
</style>
</head>

<body>
<div class="container">

<h1>Production Calculator</h1>

<div class="card">
<input type="number" id="days" placeholder="Days">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="minutes" placeholder="Minutes">
<input type="number" id="units" placeholder="Units every 9 seconds">
<input type="number" id="manual" placeholder="Manual units">
<input type="number" id="inc" placeholder="Increase % (max 50)">
<button onclick="calc()">Calculate</button>
<div class="result" id="result">Result: 0</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
<div class="stats" id="stats"></div>
</div>

</div>

<script>

let historyData = JSON.parse(localStorage.getItem("history")||"[]");

const ctx = document.getElementById("chart");
const chart = new Chart(ctx, {
type: 'line',
data: {
labels: [],
datasets: [{
data: [],
borderColor: '#ff9f0a',
backgroundColor: 'rgba(255,159,10,0.2)',
fill: true,
tension: 0.4,
pointRadius: 4
}]
},
options: {
responsive:true,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{display:false}
}
}
});

function formatNumber(value){
return Math.round(value).toLocaleString("de-DE");
}

function calc(){
let d=+days.value||0;
let h=+hours.value||0;
let m=+minutes.value||0;
let u=+units.value||0;
let man=+manual.value||0;
let i=+inc.value||0;
if(i>50)i=50;

let seconds=(d*86400)+(h*3600)+(m*60);
let base=(seconds/9)*u+man;
let final=base*(1+(i/100));

result.innerText="Result: "+formatNumber(final);

historyData.unshift(Math.round(final));
localStorage.setItem("history",JSON.stringify(historyData));

updateChart();
updateStats();
}

function updateChart(){
chart.data.labels=historyData.map((_,i)=>i+1);
chart.data.datasets[0].data=historyData;
chart.update();
}

function updateStats(){
let sum=historyData.reduce((a,b)=>a+b,0);
stats.innerText="Calculations: "+historyData.length+
"  •  Sum: "+formatNumber(sum);
}

updateChart();
updateStats();

</script>

</body>
</html>
