<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Production Calculator</title>

<style>
*{box-sizing:border-box;}

:root{
--accent:#7FB9FF;
--tint:rgba(127,185,255,0.08);
--glow:rgba(127,185,255,0.15);
--bg:#f2f2f7;
--card:rgba(255,255,255,0.8);
--text:#1c1c1e;
--secondary:#8e8e93;
--border:rgba(0,0,0,0.05);
}

@media (prefers-color-scheme: dark){
:root{
--bg:#000;
--card:rgba(28,28,30,0.85);
--text:#fff;
--secondary:#8e8e93;
--border:rgba(255,255,255,0.08);
}
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:var(--bg);
color:var(--text);
min-height:100dvh;
display:flex;
flex-direction:column;
}

.container{
flex:1;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
padding-bottom:calc(90px + env(safe-area-inset-bottom));
}

.content{
width:100%;
max-width:420px;
text-align:center;
}

h1{
font-size:24px;
font-weight:600;
margin:0 0 16px 0;
}

.card{
background:linear-gradient(var(--tint),var(--card));
backdrop-filter:blur(20px);
border-radius:26px;
padding:16px;
border:1px solid var(--border);
box-shadow:0 12px 35px var(--glow);
transition:.25s ease;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:14px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
font-size:14px;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border-radius:18px;
border:none;
font-weight:600;
background:var(--accent);
color:#000;
transition:.15s ease;
}

button:active{
transform:scale(.96);
}

.resultBlock{
margin-top:14px;
font-size:14px;
}

.highlight{
font-weight:600;
}

.smallNote{
font-size:11px;
color:var(--secondary);
margin-top:6px;
}

.switch{
position:relative;
width:46px;height:24px;
}

.switch input{display:none;}

.slider{
position:absolute;
inset:0;
background:#ccc;
border-radius:20px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
height:18px;width:18px;
left:3px;bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:var(--accent);
}

input:checked + .slider:before{
transform:translateX(22px);
}

.tabBar{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:var(--card);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid var(--border);
padding-bottom:env(safe-area-inset-bottom);
}

.tab{
flex:1;
text-align:center;
font-size:14px;
color:var(--secondary);
}

.tab.active{
color:var(--accent);
font-weight:600;
}

.view{display:none;}
.view.active{display:block;}
</style>
</head>

<body>

<div class="container">
<div class="content">

<!-- CALCULATOR -->
<div id="calculatorView" class="view active">

<h1>Calculator</h1>

<div class="card">

<input type="number" id="days" placeholder="Days">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="minutes" placeholder="Minutes (optional)">
<input type="number" id="units" placeholder="Units every 9 seconds">
<input type="number" id="manual" placeholder="Manual units (optional)">
<input type="number" id="inc" placeholder="Increase % (max 50)">

<button onclick="calc()">Calculate</button>

<div class="resultBlock" id="resultBlock">
Online: 0<br>
Offline (max 7h): 0
</div>

<div class="smallNote">
Offline calculation is always capped at 7 hours.
</div>

</div>
</div>

<!-- SETTINGS -->
<div id="settingsView" class="view">
<h1>Settings</h1>

<div class="card">

<div style="display:flex;justify-content:space-between;align-items:center;">
<span>Show Win / Lost %</span>
<label class="switch">
<input type="checkbox" id="percentToggle">
<span class="slider"></span>
</label>
</div>

<div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center;">
<span>Apply 50% comparison boost (offline)</span>
<label class="switch">
<input type="checkbox" id="boostToggle">
<span class="slider"></span>
</label>
</div>

<div class="smallNote">
Applies only to the offline comparison value when calculating online.
Does not change the actual offline calculation.
</div>

</div>
</div>

</div>
</div>

<div class="tabBar">
<div class="tab active" onclick="switchTab('calculator')">Calculator</div>
<div class="tab" onclick="switchTab('settings')">Settings</div>
</div>

<script>

let showPercent = localStorage.getItem("showPercent")==="true";
let applyBoost = localStorage.getItem("applyBoost")==="true";

percentToggle.checked = showPercent;
boostToggle.checked = applyBoost;

percentToggle.addEventListener("change",function(){
localStorage.setItem("showPercent",this.checked);
showPercent=this.checked;
});

boostToggle.addEventListener("change",function(){
localStorage.setItem("applyBoost",this.checked);
applyBoost=this.checked;
});

function format(v){
return Math.round(v).toLocaleString("de-DE");
}

function calc(){

let d=+days.value||0;
let h=+hours.value||0;
let m=+minutes.value||0;
let u=+units.value||0;
let man=+manual.value||0;
let i=+inc.value||0;
if(i>50)i=50;

let totalSeconds=(d*86400)+(h*3600)+(m*60);

// ONLINE
let online=(totalSeconds/9)*u+man;
let onlineBoosted=online*(1+(i/100));

// OFFLINE (real)
let totalHours=Math.min(totalSeconds/3600,7);
let firstTwo=Math.min(totalHours,2);
let remaining=Math.max(totalHours-2,0);

let full=(firstTwo*3600/9)*u;
let reduced=(remaining*3600/9)*u*0.2;
let offline=(full+reduced+man);

// Boost only if enabled
if(applyBoost){
let boostedReduced=(remaining*3600/9)*u*0.3;
offline=(full+boostedReduced+man);
}

let offlineBoosted=offline*(1+(i/100));

let output=`
Online: <span class="highlight">${format(onlineBoosted)}</span><br>
Offline (max 7h): <span class="highlight">${format(offlineBoosted)}</span>
`;

if(showPercent){
let percent=((offlineBoosted-onlineBoosted)/onlineBoosted)*100;
let abs=Math.abs(percent).toFixed(1);

let label="";
if(percent>0){
label=`Win +${abs}%`;
}else if(percent<0){
label=`Lost -${abs}%`;
}else{
label="Equal 0%";
}

output+=`<br><span class="highlight">${label}</span>`;
}

resultBlock.innerHTML=output;
}

function switchTab(tab){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
if(tab==="calculator"){
calculatorView.classList.add("active");
document.querySelectorAll(".tab")[0].classList.add("active");
}
if(tab==="settings"){
settingsView.classList.add("active");
document.querySelectorAll(".tab")[1].classList.add("active");
}
}

</script>

</body>
</html>
